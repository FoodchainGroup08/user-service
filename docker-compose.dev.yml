version: '3.8'

# Standalone dev compose — spins up MySQL + Redis + user-service only.
# No Eureka or Config Server required.
#
# Usage (from the user-service directory):
#   docker compose -f docker-compose.dev.yml up --build
#
# Swagger UI: http://localhost:8081/api/swagger-ui/index.html
# Health:     http://localhost:8081/api/actuator/health

networks:
  user-dev-network:
    driver: bridge

volumes:
  user-mysql-data:
  user-redis-data:

services:

  mysql:
    image: mysql:8.0
    container_name: user-service-mysql
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: devpassword
      MYSQL_DATABASE: userdb
    ports:
      - "3307:3306"
    volumes:
      - user-mysql-data:/var/lib/mysql
    networks:
      - user-dev-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdevpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: user-service-redis
    restart: on-failure
    ports:
      - "6380:6379"
    volumes:
      - user-redis-data:/data
    networks:
      - user-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  user-service:
    build:
      context: ..
      dockerfile: user-service/Dockerfile
    image: user-service:dev
    container_name: user-service
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      # Datasource
      DB_HOST: mysql
      DB_NAME: userdb
      DB_USERNAME: root
      DB_PASSWORD: devpassword
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      # JWT
      JWT_SECRET: dev-foodchain-secret-key-must-be-32-chars
      # Frontend (for password-reset links)
      FRONTEND_URL: http://localhost:5173
      # Let Hibernate create/update tables automatically in dev
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # Disable Config Server and Eureka for standalone dev
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
    networks:
      - user-dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
