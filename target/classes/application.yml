spring:
  application:
    name: user-service
  config:
    import: "optional:configserver:http://localhost:8888"
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:userdb}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}
  # OAuth2 — uncomment and set OAUTH2_ENABLED=true to activate
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,email,profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
  #         github:
  #           client-id: ${GITHUB_CLIENT_ID}
  #           client-secret: ${GITHUB_CLIENT_SECRET}
  #           scope: read:user,user:email
  #           redirect-uri: "{baseUrl}/login/oauth2/code/github"

server:
  port: 8086
  servlet:
    context-path: /api

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  # Must be at least 32 characters (256 bits) for HS256
  secret: ${JWT_SECRET:foodchain-super-secret-key-change-in-production-32chars}
  access-token-expiry-ms: 900000      # 15 minutes
  refresh-token-expiry-ms: 604800000  # 7 days

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:no-reply@foodchain.local}
  oauth2:
    enabled: ${OAUTH2_ENABLED:false}
    # Redirect URL after OAuth2 login (frontend URL)
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
  health:
    mail:
      enabled: false

logging:
  level:
    root: INFO
    com.microservices: DEBUG
